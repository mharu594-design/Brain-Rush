<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Brain Rush Dopamine Extreme</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-user-select:none;
user-select:none;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#020617,#111827);
color:white;
height:100vh;
overflow:hidden;
display:flex;
flex-direction:column;
align-items:center;
padding:10px;
touch-action:none;
animation:rainbowGlow 20s linear infinite;
}

@keyframes rainbowGlow{
0%{filter:hue-rotate(0deg);}
100%{filter:hue-rotate(360deg);}
}

@keyframes pop{
0%{transform:scale(.5);}
100%{transform:scale(1);}
}

@keyframes flash{
0%{opacity:.8;}
100%{opacity:0;}
}

@keyframes megaPulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

body.combo-mode{
background:#ff00ff;
}

h1{
font-size:2rem;
font-weight:900;
margin-bottom:10px;
background:linear-gradient(to right,#00f2fe,#4facfe,#f093fb,#f5576c);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.status{
width:100%;
max-width:430px;
display:flex;
justify-content:space-between;
background:rgba(255,255,255,.05);
padding:12px;
border-radius:18px;
margin-bottom:10px;
backdrop-filter:blur(10px);
}

.box{
flex:1;
text-align:center;
}

.label{
font-size:.7rem;
color:#94a3b8;
margin-bottom:4px;
}

.value{
font-size:1.4rem;
font-weight:900;
}

#score{color:#facc15;}
#timer{color:#ef4444;}
#level{color:#38bdf8;}

#combo{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%) scale(0);
padding:10px 18px;
border-radius:999px;
background:linear-gradient(135deg,#ff007a,#7928ca);
font-weight:900;
transition:.3s;
z-index:99;
box-shadow:0 0 10px #ff00ff,0 0 30px #ff00ff,0 0 60px #7928ca;
}

#combo.show{
transform:translateX(-50%) scale(1);
}

#gridWrap{
width:100%;
max-width:430px;
background:rgba(255,255,255,.04);
padding:10px;
border-radius:20px;
}

#grid{
display:grid;
gap:6px;
}

.cell{
aspect-ratio:1;
display:flex;
justify-content:center;
align-items:center;
background:#1e293b;
border:2px solid #334155;
border-radius:12px;
font-size:1.2rem;
font-weight:900;
transition:.1s;
}

.cell.selected{
background:linear-gradient(135deg,#00f2fe,#4facfe);
transform:scale(1.1);
border-color:white;
color:#020617;
}

.cell.found{
background:linear-gradient(135deg,#10b981,#059669);
border-color:#a7f3d0;
animation:pop .25s,rainbowGlow 2s linear infinite;
}

.words{
margin-top:10px;
width:100%;
max-width:430px;
display:flex;
flex-wrap:wrap;
gap:8px;
justify-content:center;
background:rgba(255,255,255,.05);
padding:12px;
border-radius:18px;
overflow:auto;
}

.word{
padding:6px 10px;
background:#334155;
border-radius:10px;
font-weight:700;
font-size:.9rem;
}

.word.done{
background:#10b981;
color:black;
text-decoration:line-through;
}

.controls{
width:100%;
max-width:430px;
display:flex;
gap:10px;
margin-top:10px;
}

button{
flex:1;
padding:14px;
border:none;
border-radius:14px;
font-weight:900;
font-size:1rem;
color:white;
}

#hintBtn{
background:linear-gradient(135deg,#f59e0b,#ea580c);
}

canvas{
position:fixed;
inset:0;
pointer-events:none;
}

#flash{
position:fixed;
inset:0;
background:white;
opacity:0;
pointer-events:none;
z-index:9999;
}

#flash.active{
animation:flash .25s;
}

#modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.modalBox{
width:90%;
max-width:380px;
background:#111827;
padding:30px 20px;
border-radius:25px;
text-align:center;
border:3px solid #10b981;
animation:megaPulse .5s infinite;
}

.modalBox h2{
font-size:2rem;
margin-bottom:10px;
}

.big{
font-size:3rem;
font-weight:900;
color:#facc15;
margin:20px 0;
}

.modalBtn{
background:linear-gradient(135deg,#10b981,#047857);
width:100%;
padding:16px;
border-radius:14px;
margin-top:10px;
}
</style>
</head>

<body>

<canvas id="fx"></canvas>
<div id="flash"></div>

<div id="combo">🔥 KOMBO x2</div>

<h1>⚡ Brain Rush</h1>

<div class="status">
<div class="box">
<div class="label">LEVEL</div>
<div class="value" id="level">1</div>
</div>

<div class="box">
<div class="label">MASA</div>
<div class="value" id="timer">30</div>
</div>

<div class="box">
<div class="label">SKOR</div>
<div class="value" id="score">0</div>
</div>
</div>

<div id="gridWrap">
<div id="grid"></div>
</div>

<div class="words" id="words"></div>

<div class="controls">
<button id="hintBtn">💡 HINT (-100)</button>
</div>

<div id="modal">
<div class="modalBox">
<h2 id="modalTitle">TAHNIAH!</h2>
<div class="big" id="finalScore">0</div>
<button class="modalBtn" id="modalBtn">TERUSKAN</button>
</div>
</div>

<script>
let audioCtx;
function initAudio(){
if(!audioCtx){
audioCtx=new(window.AudioContext||window.webkitAudioContext)();
}
}

function play(freq,duration=.08,type='square',vol=.04){
initAudio();
const osc=audioCtx.createOscillator();
const gain=audioCtx.createGain();
osc.type=type;
osc.frequency.value=freq;
gain.gain.value=vol;
gain.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+duration);
osc.connect(gain);
gain.connect(audioCtx.destination);
osc.start();
osc.stop(audioCtx.currentTime+duration);
}

document.body.addEventListener('touchstart',initAudio,{once:true});
document.body.addEventListener('mousedown',initAudio,{once:true}); // Tambahan untuk desktop preview

const gridEl=document.getElementById("grid");
const scoreEl=document.getElementById("score");
const timerEl=document.getElementById("timer");
const levelEl=document.getElementById("level");
const wordsEl=document.getElementById("words");
const comboEl=document.getElementById("combo");
const modal=document.getElementById("modal");
const modalBtn=document.getElementById("modalBtn");
const finalScore=document.getElementById("finalScore");
const flash=document.getElementById("flash");
const hintBtn=document.getElementById("hintBtn");

const canvas=document.getElementById('fx');
const ctx=canvas.getContext('2d');

canvas.width=innerWidth;
canvas.height=innerHeight;
window.addEventListener('resize', () => {
    canvas.width = innerWidth;
    canvas.height = innerHeight;
});

let level=1;
let score=0;
let combo=0;
let time=30;
let size=6;
let timer;

let grid=[];
let words=[];
let found=[];
let selected=[];
let dragging=false;

const dictionary=["AWAN","BUKU","MEJA","API","AIR","NASI","ROTI","SUSU","HUJAN","LAMPU","PINTU","BAJU","KUCING","ANJING","LEMBU","SINGA","BUAYA","TIKUS","TELUR","KERJA","TIDUR","JALAN","MAKAN","MINUM","BACA","TULIS"];

const dirs=[[0,1],[1,0],[1,1]];

function rand(a){
return a[Math.floor(Math.random()*a.length)];
}

function makeGrid(){
grid=[];
words=[];
found=[];
selected=[];

gridEl.innerHTML='';
wordsEl.innerHTML='';

gridEl.style.gridTemplateColumns=`repeat(${size},1fr)`;

for(let r=0;r<size;r++){
grid[r]=[];
for(let c=0;c<size;c++){
grid[r][c]='';
}
}

for(let i=0;i<5;i++){
let valid=dictionary.filter(w=>w.length<=size&&!words.includes(w));
if(valid.length === 0) break; // Keselamatan

let word=rand(valid);
let placed=false;
let attempts=0; // Mengelakkan infinite loop jika grid terlalu penuh

while(!placed && attempts < 100){
attempts++;
let dir=rand(dirs);
let row=Math.floor(Math.random()*size);
let col=Math.floor(Math.random()*size);
let fits=true;

for(let j=0;j<word.length;j++){
let nr=row+dir[0]*j;
let nc=col+dir[1]*j;

if(nr>=size||nc>=size||(grid[nr][nc]!==''&&grid[nr][nc]!==word[j])){
fits=false;
break;
}
}

if(fits){
for(let j=0;j<word.length;j++){
let nr=row+dir[0]*j;
let nc=col+dir[1]*j;
grid[nr][nc]=word[j];
}
words.push(word);
placed=true;
}
}
}

for(let r=0;r<size;r++){
for(let c=0;c<size;c++){
if(grid[r][c]===''){
grid[r][c]='ABCDEFGHIJKLMNOPQRSTUVWXYZ'[Math.floor(Math.random()*26)];
}

let div=document.createElement('div');
div.className='cell';
div.textContent=grid[r][c];
div.dataset.row=r;
div.dataset.col=c;
gridEl.appendChild(div);
}
}

words.forEach(w=>{
let div=document.createElement('div');
div.className='word';
div.id='word-'+w;
div.textContent=w;
wordsEl.appendChild(div);
});
}

function getCell(x,y){
let el=document.elementFromPoint(x,y);
if(el&&el.classList.contains('cell')) return el;
return null;
}

function selectCell(cell){
if(selected.some(s=>s.el===cell)) return;

cell.classList.add('selected');

selected.push({
el:cell,
letter:cell.textContent
});
}

function start(x,y){
dragging=true;
clear();
selected=[];
let cell=getCell(x,y);
if(cell){
selectCell(cell);
}
}

function move(x,y){
if(!dragging) return;
let cell=getCell(x,y);
if(cell){
selectCell(cell);
}
}

function end(){
if(!dragging) return;
dragging=false;

if(selected.length === 0) return;

let word1=selected.map(s=>s.letter).join('');
let word2=selected.map(s=>s.letter).reverse().join('');

let match=null;

if(words.includes(word1)&&!found.includes(word1)){
match=word1;
}else if(words.includes(word2)&&!found.includes(word2)){
match=word2;
}

if(match){

if(navigator.vibrate){
navigator.vibrate(40);
}

found.push(match);

document.getElementById('word-'+match).classList.add('done');

selected.forEach(s=>{
s.el.classList.remove('selected');
s.el.classList.add('found');

setTimeout(()=>{
if(s.el) s.el.classList.remove('found');
},300);
});

combo++;

let add=(match.length*20)*combo;
score+=add;
scoreEl.textContent=score;

scoreEl.animate([
{transform:'scale(1.6)'},
{transform:'scale(1)'}
],{duration:250});

showCombo(combo);

play(300+(combo*120));
play(600+(combo*80),.12);

flash.classList.add('active');
setTimeout(()=>{
flash.classList.remove('active');
},180);

explode();

if(found.length===words.length){
win();
}

}else{
combo=0;
selected.forEach(s=>s.el.classList.remove('selected'));
}

selected=[];
}

function clear(){
document.querySelectorAll('.selected').forEach(c=>c.classList.remove('selected'));
}

// Kawalan Touch
window.addEventListener('touchstart',e=>{
let t=e.touches[0];
start(t.clientX,t.clientY);
},{passive:false});

window.addEventListener('touchmove',e=>{
let t=e.touches[0];
move(t.clientX,t.clientY);
},{passive:false});

window.addEventListener('touchend',end);

// Kawalan Mouse (Supaya boleh test di desktop)
window.addEventListener('mousedown',e=>{
start(e.clientX,e.clientY);
});
window.addEventListener('mousemove',e=>{
move(e.clientX,e.clientY);
});
window.addEventListener('mouseup',end);

function showCombo(c){
if(c<=1) return;
comboEl.textContent='🔥 KOMBO x'+c;
comboEl.classList.add('show');

if(c>=5){
document.body.classList.add('combo-mode');
}

if(c>=10){
comboEl.textContent='⚡ GODLIKE x'+c;
play(1200,.2,'sawtooth',.08);
}

setTimeout(()=>{
comboEl.classList.remove('show');
document.body.classList.remove('combo-mode');
},900);
}

let particles=[];

function explode(){
for(let i=0;i<30;i++){
particles.push({
x:innerWidth/2,
y:innerHeight/2,
vx:(Math.random()-.5)*15,
vy:(Math.random()-.5)*15,
life:1,
color:`hsl(${Math.random()*360},100%,60%)`
});
}
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach((p,i)=>{
p.x+=p.vx;
p.y+=p.vy;
p.life-=0.02;
ctx.globalAlpha=Math.max(0, p.life);
ctx.beginPath();
ctx.arc(p.x,p.y,5,0,Math.PI*2);
ctx.fillStyle=p.color;
ctx.fill();
if(p.life<=0){
particles.splice(i,1);
}
});

requestAnimationFrame(animate);
}
animate();

function startTimer(){
clearInterval(timer);

timer=setInterval(()=>{
time--;
timerEl.textContent=time;

if(time<=5){
play(1000,.03,'sine',.02);
}

if(time<=0){
lose();
}
},1000);
}

function win(){
clearInterval(timer);

if(navigator.vibrate){
navigator.vibrate([120,50,120,50,250]);
}

for(let i=0;i<12;i++){
setTimeout(()=>{
play(400+(i*70),.15,'triangle',.05);
},i*70);
}

document.getElementById("modalTitle").textContent="TAHNIAH!";
finalScore.textContent=score;
modalBtn.textContent='LEVEL SETERUSNYA';
modalBtn.onclick=nextLevel;
modal.style.display='flex';
}

function lose(){
clearInterval(timer);

document.getElementById("modalTitle").textContent="MASA TAMAT";
finalScore.textContent=score;
modalBtn.textContent='MAIN SEMULA';
modalBtn.onclick=restart;
modal.style.display='flex';
}

function nextLevel(){
modal.style.display='none';
level++;
time=30+(level*3);
size=Math.min(8,5+Math.floor(level/2));
levelEl.textContent=level;
timerEl.textContent=time;
makeGrid();
startTimer();
}

function restart(){
modal.style.display='none';
level=1;
score=0;
combo=0;
time=30;
size=6;
levelEl.textContent=level;
scoreEl.textContent=score;
timerEl.textContent=time;
makeGrid();
startTimer();
}

// Butang Bantuan
hintBtn.onclick = () => {
    if (score < 100) return;
    score -= 100;
    scoreEl.textContent = score;

    const remain = words.filter(w => !found.includes(w));
    if (remain.length === 0) return;

    const word = remain[0];
    let foundCell = false;
    document.querySelectorAll(".cell").forEach(c => {
        if (!foundCell && c.textContent === word[0] && !c.classList.contains("found")) {
            let isCorrectStart = false;
            let r = +c.dataset.row;
            let col = +c.dataset.col;
            
            for(let d=0; d<dirs.length; d++) {
                let fits = true;
                for(let j=0; j<word.length; j++) {
                    let nr = r + dirs[d][0] * j;
                    let nc = col + dirs[d][1] * j;
                    if(nr >= size || nc >= size || grid[nr][nc] !== word[j]) {
                        fits = false; break;
                    }
                }
                if(fits) { isCorrectStart = true; break; }
            }

            if(isCorrectStart) {
                foundCell = true;
                c.style.backgroundColor = "#f59e0b";
                c.style.color = "#000";
                c.animate([
                    { transform: "scale(1)" },
                    { transform: "scale(1.3) rotate(10deg)" },
                    { transform: "scale(1) rotate(-10deg)" },
                    { transform: "scale(1) rotate(0)" }
                ], { duration: 600, iterations: 2 });
                setTimeout(() => { c.style.backgroundColor = ""; c.style.color = ""; }, 1200);
            }
        }
    });
};

makeGrid();
startTimer();
</script>

</body>
</html>
